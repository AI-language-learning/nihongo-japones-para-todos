  },
  {
    n:22, status:'pendiente', section:'Sec 07 — Doble nominativo', secId:'sec7',
    location:'#sec7 .data-table (fila 得意だ)',
    original:'Tanaka se le da bien la matemática.',
    comentario:'Debería ser: «A Tanaka se le da bien la matemática.» o «Tanaka se le dan bien las matemáticas.»',
    claude:'Ambas correcciones son válidas y apuntan a errores reales. (1) Falta la «A» inicial: «darse bien» rige objeto indirecto con preposición en español («A Tanaka se le da bien»). (2) «Las matemáticas» en plural es más natural que «la matemática». Y hay un tercer error que el lector no menciona: la concordancia verbal. Con «las matemáticas» en plural, el verbo también concuerda en plural: «se le dan bien». La forma corregida completa: «A Tanaka se le dan bien las matemáticas.»'
  },
  {
    n:23, status:'pendiente', section:'Sec 08 — は vs が con だ', secId:'sec8',
    location:'#sec8 .case-card (私はウナギだ)',
    original:'Gramaticalmente, esta oración afirma que «yo soy una anguila», lo cual es biológicamente absurdo... que podría tener sentido si el camarero lleva la anguila y busca a quién dársela.',
    comentario:'(1) Cuidado: afirmar «yo = anguila» puede llevar al alumno a equiparar は con el verbo ser. (2) La situación descrita sería más clara con «si el camarero trajera el plato de anguila y buscara a quién servírselo».',
    claude:'(1) El riesgo existe, pero el párrafo siguiente ya lo deshace al explicar que lo que funciona es は como tópico situacional, no como cópula. El problema real es de presentación: el arranque da pie al malentendido antes de corregirlo. Una pequeña reescritura ayudaría: «Literalmente diría que yo soy una anguila —lo cual es absurdo—, pero eso no es lo que は está haciendo aquí.» (2) La observación sobre la situación del camarero es correcta: «lleva la anguila y busca a quién dársela» describe mal la situación de restaurante. La propuesta del lector («trajera el plato de anguila y buscara a quién servírselo») es más precisa y usa el subjuntivo apropiado para una hipótesis.'
  }
];

const filters = [
  { label:'Todos', key:'all' }, { label:'Pendientes', key:'pendiente' }, { label:'Resueltos', key:'resuelto' },
  { label:'Hero / intro', key:'hero' }, { label:'Sec 01', key:'sec1' }, { label:'Sec 02', key:'sec2' },
  { label:'Sec 03', key:'sec3' }, { label:'Sec 04', key:'sec4' }, { label:'Sec 06', key:'sec6' },
  { label:'Sec 07', key:'sec7' }, { label:'Sec 08', key:'sec8' },
];

function buildToolbar() {
  const tb = document.getElementById('toolbar');
  filters.forEach(f => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn' + (f.key === 'all' ? ' active' : '');
    btn.textContent = f.label;
    btn.onclick = () => applyFilter(f.key, btn);
    tb.appendChild(btn);
  });
}

function buildCards() {
  const main = document.getElementById('main');
  main.innerHTML = '';
  data.forEach(item => {
    const card = document.createElement('div');
    card.className = 'card';
    card.dataset.status = item.status;
    card.dataset.secId = item.secId;
    const notaHtml = item.nota
      ? `<div class="block block-nota"><div class="block-label">Nota</div><p>${item.nota}</p></div>` : '';
    card.innerHTML = `
      <div class="card-header" onclick="toggle(this)">
        <div class="card-num num-${item.status}">${item.n}</div>
        <div class="card-meta">
          <div class="card-badges">
            <span class="badge badge-section">${item.section}</span>
            <span class="badge badge-location">${item.location}</span>
            <span class="badge badge-${item.status}">${item.status === 'pendiente' ? 'Pendiente' : 'Resuelto'}</span>
          </div>
          <div class="card-preview">${trunc(item.original, 95)}</div>
        </div>
        <span class="chevron">›</span>
      </div>
      <div class="card-body">
        <div class="block block-original">
          <div class="block-label">Texto original (wa-ga.html)</div>
          <p>${item.original}</p>
        </div>
        <div class="block block-comentario">
          <div class="block-label">Comentario del lector</div>
          <p>${item.comentario}</p>
        </div>
        <div class="block block-claude">
          <div class="block-label">Opinión de Claude</div>
          <p>${item.claude}</p>
        </div>
        ${notaHtml}
      </div>
    `;
    main.appendChild(card);
  });
  updateCounts();
}

function toggle(header) {
  const body = header.nextElementSibling;
  const ch = header.querySelector('.chevron');
  const open = body.classList.toggle('open');
  ch.classList.toggle('open', open);
}

function applyFilter(key, btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.card').forEach(c => {
    const show = key === 'all' || c.dataset.status === key || c.dataset.secId === key;
    c.classList.toggle('hidden', !show);
  });
  updateCounts();
}

function updateCounts() {
  const visible = [...document.querySelectorAll('.card:not(.hidden)')];
  document.getElementById('vis-count').textContent = visible.length;
  document.getElementById('pend-count').textContent = visible.filter(c => c.dataset.status === 'pendiente').length;
  document.getElementById('res-count').textContent  = visible.filter(c => c.dataset.status === 'resuelto').length;
  const main = document.getElementById('main');
  let empty = main.querySelector('.empty');
  if (visible.length === 0) {
    if (!empty) { empty = document.createElement('div'); empty.className = 'empty'; empty.textContent = 'No hay comentarios en esta categoría.'; main.appendChild(empty); }
  } else { if (empty) empty.remove(); }
}

function trunc(str, n) { return str.length > n ? str.slice(0, n) + '…' : str; }

buildToolbar();
buildCards();
</script>
</body>
</html>
