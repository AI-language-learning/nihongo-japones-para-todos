  { label:'Hero / intro', key:'hero' }, { label:'Sec 01', key:'sec1' }, { label:'Sec 02', key:'sec2' },
  { label:'Sec 03', key:'sec3' }, { label:'Sec 04', key:'sec4' }, { label:'Sec 06', key:'sec6' },
  { label:'Sec 07', key:'sec7' }, { label:'Sec 08', key:'sec8' },
];

function buildToolbar() {
  const tb = document.getElementById('toolbar');
  filters.forEach(f => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn' + (f.key === 'all' ? ' active' : '');
    btn.textContent = f.label;
    btn.onclick = () => applyFilter(f.key, btn);
    tb.appendChild(btn);
  });
}

function buildCards() {
  const main = document.getElementById('main');
  main.innerHTML = '';
  data.forEach(item => {
    const card = document.createElement('div');
    card.className = 'card';
    card.dataset.status = item.status;
    card.dataset.secId = item.secId;
    const notaHtml = item.nota
      ? `<div class="block block-nota"><div class="block-label">Nota</div><p>${item.nota}</p></div>` : '';
    card.innerHTML = `
      <div class="card-header" onclick="toggle(this)">
        <div class="card-num num-${item.status}">${item.n}</div>
        <div class="card-meta">
          <div class="card-badges">
            <span class="badge badge-section">${item.section}</span>
            <span class="badge badge-location">${item.location}</span>
            <span class="badge badge-${item.status}">${item.status === 'pendiente' ? 'Pendiente' : 'Resuelto'}</span>
          </div>
          <div class="card-preview">${trunc(item.original, 95)}</div>
        </div>
        <span class="chevron">›</span>
      </div>
      <div class="card-body">
        <div class="block block-original">
          <div class="block-label">Texto original (wa-ga.html)</div>
          <p>${item.original}</p>
        </div>
        <div class="block block-comentario">
          <div class="block-label">Comentario del lector</div>
          <p>${item.comentario}</p>
        </div>
        <div class="block block-claude">
          <div class="block-label">Opinión de Claude</div>
          <p>${item.claude}</p>
        </div>
        ${notaHtml}
      </div>
    `;
    main.appendChild(card);
  });
  updateCounts();
}

function toggle(header) {
  const body = header.nextElementSibling;
  const ch = header.querySelector('.chevron');
  const open = body.classList.toggle('open');
  ch.classList.toggle('open', open);
}

function applyFilter(key, btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.card').forEach(c => {
    const show = key === 'all' || c.dataset.status === key || c.dataset.secId === key;
    c.classList.toggle('hidden', !show);
  });
  updateCounts();
}

function updateCounts() {
  const visible = [...document.querySelectorAll('.card:not(.hidden)')];
  document.getElementById('vis-count').textContent = visible.length;
  document.getElementById('pend-count').textContent = visible.filter(c => c.dataset.status === 'pendiente').length;
  document.getElementById('res-count').textContent  = visible.filter(c => c.dataset.status === 'resuelto').length;
  const main = document.getElementById('main');
  let empty = main.querySelector('.empty');
  if (visible.length === 0) {
    if (!empty) { empty = document.createElement('div'); empty.className = 'empty'; empty.textContent = 'No hay comentarios en esta categoría.'; main.appendChild(empty); }
  } else { if (empty) empty.remove(); }
}

function trunc(str, n) { return str.length > n ? str.slice(0, n) + '…' : str; }

buildToolbar();
buildCards();
</script>
</body>
</html>
